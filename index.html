<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPE App</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; }
.box { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
.header { background: #2563eb; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: 600; }
.tabs { display: flex; border-bottom: 1px solid #ddd; }
.tab { flex: 1; padding: 15px; border: none; background: none; font-weight: 600; color: #999; cursor: pointer; font-size: 12px; text-transform: uppercase; transition: all 0.2s; }
.tab.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
.content { padding: 30px; }
.form { display: none; }
.form.active { display: block; }
input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; }
input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px; text-transform: uppercase; margin-top: 5px; transition: all 0.2s; }
button:hover { background: #1d4ed8; }
button:active { transform: scale(0.98); }
.alert { padding: 12px; margin-bottom: 15px; border-radius: 6px; font-size: 12px; display: none; }
.alert.show { display: block; }
.alert.error { background: #fee; color: #c33; }
.alert.success { background: #efe; color: #3c3; }
.link { text-align: center; margin-top: 15px; font-size: 12px; color: #666; }
.link a { color: #2563eb; cursor: pointer; text-decoration: none; font-weight: 600; }
.app { display: none; }
.app.active { display: block; padding: 30px; text-align: center; }
.app h2 { color: #1a2744; margin-bottom: 10px; }
.app p { color: #666; margin-bottom: 10px; }
.logout { background: #dc2626 !important; margin-top: 20px; }
</style>
</head>
<body>

<div class="box">
  <div id="auth-screen">
    <div class="header">SPE App</div>
    <div class="tabs">
      <button class="tab active" id="tab-login">Вход</button>
      <button class="tab" id="tab-register">Регистрация</button>
    </div>
    <div class="content">
      <div class="form active" id="login-form">
        <div class="alert" id="login-alert"></div>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-pass" placeholder="Пароль">
        <button onclick="handleLogin()">Войти</button>
        <div class="link">Нет? <a onclick="switchTab('register')">Регистрация</a></div>
      </div>
      <div class="form" id="register-form">
        <div class="alert" id="register-alert"></div>
        <input type="email" id="register-email" placeholder="Email">
        <input type="password" id="register-pass" placeholder="Пароль">
        <input type="password" id="register-pass2" placeholder="Подтверди">
        <button onclick="handleRegister()">Зарегистрироваться</button>
        <div class="link">Есть? <a onclick="switchTab('login')">Вход</a></div>
      </div>
    </div>
  </div>

  <div id="app-screen" class="app">
    <div class="header">✅ SPE App</div>
    <p id="user-email"></p>
    <p>Ты авторизован в Supabase</p>
    <button class="logout" onclick="handleLogout()">Выход</button>
  </div>
</div>

<script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.0"></script>

<script>
let supabaseClient = null;
let currentUser = null;

// Инициализировать Supabase когда скрипт загружен
function initSupabase() {
  if (window.supabase && !supabaseClient) {
    supabaseClient = window.supabase.createClient(
      'https://bphnicubcktcdxbxiqpa.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwaG5pY3ViY2t0Y2R4YnhpcXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1ODg3NjgsImV4cCI6MjA5MjE2NDc2OH0.WCP6EiJ_uGd_nPHDWJCGN-5-BXl0GBSXUvsEjqwiDYo'
    );
    console.log('✅ Supabase готова');
    
    // Проверить авторизацию
    checkAuth();
  } else if (!window.supabase) {
    setTimeout(initSupabase, 100);
  }
}

async function checkAuth() {
  if (!supabaseClient) return;
  
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (user) {
    currentUser = user;
    showApp();
  } else {
    showAuth();
  }
}

function switchTab(tab) {
  document.getElementById('login-form').classList.toggle('active', tab === 'login');
  document.getElementById('register-form').classList.toggle('active', tab === 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

function showAlert(elementId, message, type) {
  const el = document.getElementById(elementId);
  el.textContent = message;
  el.classList.add('show');
  el.classList.toggle('error', type === 'error');
  el.classList.toggle('success', type === 'success');
  
  setTimeout(() => {
    el.classList.remove('show');
  }, 4000);
}

async function handleRegister() {
  if (!supabaseClient) {
    showAlert('register-alert', '❌ Суpabase загружается...', 'error');
    return;
  }

  const email = document.getElementById('register-email').value.trim();
  const pass = document.getElementById('register-pass').value;
  const pass2 = document.getElementById('register-pass2').value;

  if (!email || !pass || !pass2) {
    showAlert('register-alert', '❌ Заполни все поля', 'error');
    return;
  }

  if (pass.length < 6) {
    showAlert('register-alert', '❌ Пароль минимум 6 символов', 'error');
    return;
  }

  if (pass !== pass2) {
    showAlert('register-alert', '❌ Пароли не совпадают', 'error');
    return;
  }

  showAlert('register-alert', '⏳ Регистрация...', 'success');

  try {
    const { data, error } = await supabaseClient.auth.signUpWithPassword({
      email: email,
      password: pass
    });

    if (error) {
      showAlert('register-alert', '❌ ' + error.message, 'error');
    } else {
      showAlert('register-alert', '✅ Регистрация успешна!', 'success');
      document.getElementById('register-email').value = '';
      document.getElementById('register-pass').value = '';
      document.getElementById('register-pass2').value = '';
      
      setTimeout(() => {
        document.getElementById('login-email').value = email;
        switchTab('login');
      }, 2000);
    }
  } catch (err) {
    showAlert('register-alert', '❌ ' + err.message, 'error');
  }
}

async function handleLogin() {
  if (!supabaseClient) {
    showAlert('login-alert', '❌ Supabase загружается...', 'error');
    return;
  }

  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;

  if (!email || !pass) {
    showAlert('login-alert', '❌ Заполни email и пароль', 'error');
    return;
  }

  showAlert('login-alert', '⏳ Вход...', 'success');

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: pass
    });

    if (error) {
      showAlert('login-alert', '❌ ' + error.message, 'error');
    } else {
      currentUser = data.user;
      showAlert('login-alert', '✅ Успешный вход!', 'success');
      setTimeout(() => {
        showApp();
      }, 500);
    }
  } catch (err) {
    showAlert('login-alert', '❌ ' + err.message, 'error');
  }
}

async function handleLogout() {
  if (!confirm('Выйти?')) return;

  try {
    await supabaseClient.auth.signOut();
    currentUser = null;
    document.getElementById('login-email').value = '';
    document.getElementById('login-pass').value = '';
    showAuth();
  } catch (err) {
    console.error('❌ Ошибка выхода:', err);
  }
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'block';
  document.getElementById('app-screen').classList.remove('active');
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').classList.add('active');
  document.getElementById('user-email').textContent = '📧 ' + currentUser.email;
}

// Инициализировать при загрузке страницы
window.addEventListener('load', initSupabase);
initSupabase();
</script>

</body>
</html>
